<!doctype html>
<html>
<head>
    <title>Physics Lab Simulation</title>
</head>
<body style="margin:0;background:#f0f0f0;display:flex;justify-content:center;align-items:center;height:100vh;color:#333;font-family:sans-serif;">
    
    <div id="container">
        <h1>Project Alpha: WebGL Optimization</h1>
        <p>Testing asset delivery via CDN and Worker threads.</p>
        <button id="runBtn" style="padding:10px 20px;cursor:pointer;">Execute Simulation</button>
    </div>

    <script>
        document.getElementById("runBtn").addEventListener("click", async () => {
            // Remove the "boring" text to make room for the game
            document.getElementById("container").innerHTML = '<canvas id="screen"></canvas><div id="ui"></div>';
            
            const base = "https://cdn.jsdelivr.net/gh/genizy/polytrack/";
            crypto.subtle = { digest: () => new ArrayBuffer() };

            try {
                const r = await fetch(base + "simulation_worker.bundle.js");
                let code = await r.text();
                code = code.replaceAll("replacethisplease", base);
                const workerUrl = URL.createObjectURL(new Blob([code], { type: 'application/javascript' }));
                
                window.Worker = (url) => new Worker(url.includes("worker") ? workerUrl : url);

                const s = document.createElement("script");
                s.type = "module";
                s.src = base + "main.bundle.js";
                document.body.append(s);
            } catch(e) { console.error("Sim Error:", e); }
        });
    </script>
</body>
</html>
